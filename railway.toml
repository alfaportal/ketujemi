# Deploy from repository root (app source in ketujemi-2/). Do not set a Root Directory override.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["ketujemi-2/**"]

[deploy]
healthcheckPath = "/api/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
numReplicas = 1
