# KetuJemi production on Railway (ketujemi.com). Link GitHub repo alfaportal/ketujemi, branch master.
# Required: DATABASE_URL, SESSION_SECRET (16+ chars), PUBLIC_APP_ORIGIN=https://ketujemi.com
# VITE_* vars must be set before build (Cloudinary, reCAPTCHA, Stripe publishable).

[build]
builder = "NIXPACKS"
buildCommand = "node scripts/railway-build.mjs"
nixpacksConfigPath = "ketujemi-2/nixpacks.toml"

[deploy]
preDeployCommand = "node scripts/railway-predeploy.mjs"
startCommand = "node scripts/railway-start.mjs"
healthCheckPath = "/api/healthz"
