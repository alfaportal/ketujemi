# Required service variables (set in Railway dashboard or `pnpm run railway:env:vonage`):
# DATABASE_URL, SESSION_SECRET (min 16 chars), VONAGE_API_KEY, VONAGE_API_SECRET
# reCAPTCHA v2 (SMS): VITE_RECAPTCHA_SITE_KEY (build + runtime), RECAPTCHA_SECRET_KEY (API only)
# Cloudinary photos: VITE_CLOUDINARY_CLOUD_NAME, VITE_CLOUDINARY_UPLOAD_PRESET (unsigned preset)
# Contact form: EMAIL_USER, EMAIL_PASS (SMTP); optional CONTACT_INBOX=info@ketujemi.com

[build]
builder = "NIXPACKS"
nixpacksConfigPath = "nixpacks.toml"
buildCommand = "pnpm install --no-frozen-lockfile && NODE_ENV=production BASE_PATH=/ NODE_OPTIONS=--max-old-space-size=4096 pnpm run build:production"
nixpacksPlan = { phases = { install = { cmds = ["pnpm install --no-frozen-lockfile"] } } }

[deploy]
preDeployCommand = "pnpm run db:push"
startCommand = "pnpm start"
healthCheckPath = "/api/healthz"
