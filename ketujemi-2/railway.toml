# Railway auto-detect (Railpack). Set service Root Directory to ketujemi-2.
[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && node ./scripts/build-production.mjs"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
numReplicas = 1
