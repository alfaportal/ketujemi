kind = "web"
previewPath = "/"
title = "KetuJemi — Bli & Shit"
version = "1.0.0"
id = "artifacts/vendi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23427

[services.development]
run = "pnpm --filter @workspace/vendi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vendi", "run", "build" ]
publicDir = "artifacts/vendi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23427"
BASE_PATH = "/"
