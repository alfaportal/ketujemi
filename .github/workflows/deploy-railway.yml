# Verifikon build-in (frontend + API bundle për Vercel) në çdo push në master.
name: Build KetuJemi

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install and build (Vercel layout)
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Build OK
        run: echo "Frontend + api/handler.mjs u build-uan. Deploy në Vercel nga GitHub."
