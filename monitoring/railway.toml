# Uptime monitor cron — add a separate Railway service and set Config file path to /monitoring/railway.toml
# Required variables: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node monitoring/uptime-monitor.mjs"
cronSchedule = "0 * * * *"
restartPolicyType = "NEVER"
