# KetuJemi — Capacitor iOS & Android CI on Codemagic
#
# Canonical location: repository root (alfaportal/ketujemi/codemagic.yaml).
# Codemagic auto-detects this file — no custom "Project path" needed.
#
# iOS setup:
#   Code signing → iOS: Distribution certificate (.p12) + provisioning profile
#   for bundle ID com.ketujemi.app.
#
# Android setup (environment variables in Codemagic — no code signing identities):
#   CM_KEYSTORE          — base64-encoded release .jks file
#   CM_KEYSTORE_PASSWORD — keystore password
#   CM_KEY_ALIAS         — key alias (e.g. ketujemi)
#   CM_KEY_PASSWORD      — key password
#
# The native app loads the live site (https://ketujemi.com) — no Vite web build step.

workflows:
  ketujemi-ios-capacitor:
    name: KetuJemi iOS (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ketujemi.app
      vars:
        BUNDLE_ID: com.ketujemi.app
        VENDI_DIR: ketujemi-2/artifacts/vendi
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 22
      xcode: latest

    scripts:
      - name: Install monorepo dependencies (pnpm)
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR"
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm install --frozen-lockfile

      - name: Sync Capacitor iOS project
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR/$VENDI_DIR"
          pnpm cap:sync ios

      - name: Set up code signing settings on Xcode project
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR/$VENDI_DIR"
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR/$VENDI_DIR"
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$VENDI_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - ketujemi-2/artifacts/vendi/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

  ketujemi-android-google-play:
    name: KetuJemi Android (Google Play)
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      groups:
        - ketujemi_android_signing
      vars:
        PACKAGE_NAME: com.ketujemi.app
        VENDI_DIR: ketujemi-2/artifacts/vendi
      node: 22
      java: 21

    scripts:
      - name: Install monorepo dependencies (pnpm)
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR"
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm install --frozen-lockfile

      - name: Sync Capacitor Android project
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR/$VENDI_DIR"
          pnpm cap:sync android

      - name: Set Android SDK location
        script: |
          set -euxo pipefail
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/$VENDI_DIR/android/local.properties"

      - name: Build signed release AAB
        script: |
          set -euxo pipefail
          for var in CM_KEYSTORE CM_KEYSTORE_PASSWORD CM_KEY_ALIAS CM_KEY_PASSWORD; do
            if [ -z "${!var:-}" ]; then
              echo "Missing $var — add as secure environment variable in Codemagic."
              exit 1
            fi
          done
          export CM_KEYSTORE_PATH="$CM_BUILD_DIR/keystore.jks"
          echo "$CM_KEYSTORE" | base64 --decode > "$CM_KEYSTORE_PATH"
          echo "Keystore: $CM_KEYSTORE_PATH (alias $CM_KEY_ALIAS)"
          cd "$CM_BUILD_DIR/$VENDI_DIR/android"
          chmod +x ./gradlew
          ./gradlew bundleRelease --stacktrace

      - name: Verify AAB package name
        script: |
          set -euxo pipefail
          AAB=$(find "$CM_BUILD_DIR/$VENDI_DIR/android/app/build/outputs/bundle" -name '*.aab' | head -n 1)
          test -n "$AAB"
          echo "Built: $AAB"
          aapt2 dump badging "$AAB" | grep -F "package: name='$PACKAGE_NAME'"

    artifacts:
      - ketujemi-2/artifacts/vendi/android/app/build/outputs/bundle/release/*.aab
      - ketujemi-2/artifacts/vendi/android/app/build/outputs/**/*.aab
