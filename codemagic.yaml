# KetuJemi — Capacitor iOS CI on Codemagic
#
# This file lives at the GitHub repository root (alfaportal/ketujemi).
# Codemagic auto-detects codemagic.yaml here — no custom "Project path" needed.
#
# One-time dashboard setup:
# 1. Connect GitHub repo alfaportal/ketujemi.
# 2. Under Code signing → iOS, upload Distribution certificate (.p12) and
#    App Store / Ad Hoc provisioning profile for bundle ID com.ketujemi.app.
# 3. Optionally link App Store Connect API key for TestFlight / App Store publish.
#
# The native app loads the live site (https://ketujemi.com) — no Vite web build step.

workflows:
  ketujemi-ios-capacitor:
    name: KetuJemi iOS (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      # Fetch signing files uploaded in Codemagic for this bundle ID.
      # Change distribution_type to ad_hoc or development for non–App Store IPAs.
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ketujemi.app
      vars:
        BUNDLE_ID: com.ketujemi.app
        VENDI_DIR: ketujemi-2/artifacts/vendi
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
      node: 22
      xcode: latest

    scripts:
      - name: Install monorepo dependencies (pnpm)
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR"
          corepack enable
          corepack prepare pnpm@10.12.1 --activate
          pnpm install --frozen-lockfile

      - name: Sync Capacitor iOS project
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR/$VENDI_DIR"
          pnpm cap:sync ios

      - name: Set up code signing settings on Xcode project
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR/$VENDI_DIR"
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -euxo pipefail
          cd "$CM_BUILD_DIR/$VENDI_DIR"
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$VENDI_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - ketujemi-2/artifacts/vendi/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
